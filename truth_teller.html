            const generatePoints = (text, serialNumber) => {
                const words = text.trim().toUpperCase().split(/\s+/).filter(w => w.length > 0);
                const usedCoords = new Set();
                const newPoints = [];

                words.forEach(word => {
                    const wordPoints = [];
                    for (let i = 0; i < word.length; i++) {
                        const char = word[i];
                        if (!/[A-Z]/.test(char)) continue;

                        let x, y, key;
                        do {
                            // 安全邊界防裁切 (-18 ~ 18)
                            x = Math.floor(Math.random() * 37) - 18; 
                            y = Math.floor(Math.random() * 37) - 18; 
                            if (x === 0 && y === 0) continue;
                            key = `${x},${y}`;
                        } while (usedCoords.has(key));

                        usedCoords.add(key);
                        wordPoints.push({ char, x, y, pos: i % 2 === 0 ? 'below' : 'above' });
                    }
                    if (wordPoints.length > 0) newPoints.push(wordPoints);
                });
                return { points: newPoints, serial: serialNumber, text: text };
            };

            const generateWorksheet = (text = sentence) => {
                setPreviewData(generatePoints(text, '範例'));
            };

                    let shuffledPhrases = [...phrases].sort(() => Math.random() - 0.5);

                        let targetSentence = sentence;
                        if (batchMode === 'random') {
                            // 💡 如果題庫抽完了，重新洗一副牌補充
                            if (shuffledPhrases.length === 0) {

                            }
                            // 從池子裡抽出一句 (保證與前幾句不重複)
                            targetSentence = shuffledPhrases.pop().en;
                        }
                        const serialNum = String(i + 1).padStart(3, '0');
                        pages.push(generatePoints(targetSentence, serialNum));
                    }
                    setPrintPagesData(pages);
                    
                    const renderDelay = Math.max(1000, printAmount * 50);
                    setTimeout(() => {
                        setIsPreparingPrint(false); 
                        requestAnimationFrame(() => {

                                }
                            }, 500);
                        });
                    }, renderDelay);
                }, 100);
            };

                });

                const targetCount = Math.ceil(Math.max(uniqueTexts.length, 1) / 14) * 14;
                const availableDistractors = phrases.filter(p => !uniqueTexts.includes(p.en));
                availableDistractors.sort(() => Math.random() - 0.5);

                while (dictItems.length < targetCount && availableDistractors.length > 0) {
                    dictItems.push(availableDistractors.pop());
                }

                return dictItems.sort(() => Math.random() - 0.5);
            };

            return (
                <div className="relative">
                    {/* 載入中遮罩 */}
                    {isPreparingPrint && (
                        <div className="fixed inset-0 bg-slate-900/60 flex justify-center items-center z-50 print-hidden backdrop-blur-sm transition-opacity">
                            <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-11/12 text-center border-t-4 border-emerald-500 transform transition-all">
                                <svg className="animate-spin h-12 w-12 text-emerald-500 mx-auto mb-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                <h3 className="text-xl font-bold text-gray-900 mb-2 font-sans">繪製排版中，請稍候...</h3>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row min-h-screen md:h-screen w-full md:overflow-hidden print-hidden">
                        <div className="w-full md:w-[420px] bg-white shadow-xl z-10 p-5 md:p-6 flex flex-col md:overflow-y-auto shrink-0 border-b md:border-b-0 md:border-r border-gray-200">
                            <div className="flex items-center gap-3 mb-5 md:mb-6 text-blue-600">
                                <svg className="w-7 h-7 md:w-8 md:h-8 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                                <h1 className="text-lg md:text-xl font-bold tracking-wide">實話直說學習單產生器</h1>
                            </div>

                            <div className="space-y-5 md:space-y-6 flex-1">
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">
                                    <label className="flex items-center justify-between block text-sm font-bold text-gray-800 mb-2">
                                        <span>1. 自訂解碼句子 (英文)</span>
                                        <span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-md">內建百句等長題庫</span>
                                    </label>
                                    <textarea 
                                        className="w-full border border-gray-300 rounded-lg p-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-200 uppercase shadow-sm" 
                                        rows="2" 
                                        value={sentence} 
                                        onChange={(e) => setSentence(e.target.value)} 
                                    />
                                    <div className="flex justify-between items-center mt-3 gap-2">
                                        <button onClick={handleRandomPhrase} className="flex-1 text-xs md:text-sm bg-indigo-600 text-white hover:bg-indigo-700 px-3 py-2 rounded-md font-bold shadow-sm whitespace-nowrap transition-colors">✨ 隨機抽題</button>
                                        <button onClick={handleApplyAndScroll} className="flex-1 text-xs md:text-sm bg-blue-600 text-white hover:bg-blue-700 px-3 py-2 rounded-md font-bold shadow-sm whitespace-nowrap transition-colors">套用自訂 / 刷新座標</button>
                                    </div>
                                </div>
                                <label className="flex items-center gap-3 cursor-pointer group bg-white p-3 rounded-lg border border-slate-200 shadow-sm transition-colors hover:border-blue-300">
                                    <input type="checkbox" className="w-5 h-5 text-blue-600 rounded cursor-pointer shrink-0" checked={showAnswers} onChange={(e) => setShowAnswers(e.target.checked)} />
                                    <span className="text-sm md:text-base text-gray-700 font-medium">預覽畫面顯示答案</span>
                                </label>
                            </div>

                            <div className="pt-5 md:pt-6 border-t border-gray-200 mt-5 md:mt-4">
                                <label className="block text-[15px] font-bold text-gray-800 mb-3">3. 批次列印設定</label>
                                <div className="space-y-3 mb-4">
                                    <select className="w-full border border-gray-300 rounded-lg p-2.5 text-[14px] font-bold text-indigo-700 bg-white focus:ring-2 focus:ring-indigo-200 focus:outline-none" value={batchMode} onChange={(e) => setBatchMode(e.target.value)}>
                                        <option value="same">全班同題 (座標不同，防作弊)</option>
                                        <option value="random">全班隨機題 (不重複抽樣)</option>
                                    </select>
                                    <select className="w-full border border-amber-300 rounded-lg p-2.5 text-[14px] font-bold text-amber-900 bg-white focus:ring-2 focus:ring-amber-200 focus:outline-none" value={answerMode} onChange={(e) => setAnswerMode(e.target.value)}>
                                        <option value="summary">解答總表模式 (省紙好對答案)</option>
                                        <option value="full">每題完整附解答版 (耗紙)</option>
                                        <option value="none">不印解答</option>
                                    </select>
                                    
                                    <label className="flex items-start gap-2 pt-2 cursor-pointer">
                                        <input type="checkbox" className="w-4 h-4 mt-0.5 text-amber-600 rounded cursor-pointer shrink-0" checked={printStudentDict} onChange={(e) => setPrintStudentDict(e.target.checked)} />
                                        <span className="text-[13px] text-amber-900 font-bold leading-snug">附加「學生字庫」(以 14 句為單位列印)</span>
                                    </label>

                                    <div className="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-200 mt-2 shadow-sm">
                                        <span className="text-sm md:text-base text-gray-700 font-bold">要產生幾張？</span>
                                        <div className="flex items-center gap-2">
                                            <input type="number" min="1" max="100" className="w-16 md:w-20 border border-gray-300 rounded-lg p-1.5 text-center text-lg font-bold text-emerald-700 bg-white focus:ring-2 focus:ring-emerald-200 focus:outline-none" value={printAmount} onChange={(e) => setPrintAmount(Math.max(1, parseInt(e.target.value) || 1))} />
                                            <span className="text-gray-600 font-bold pr-1">張</span>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={handlePrint} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 md:py-4 px-4 rounded-xl shadow-md text-base md:text-lg transition-transform active:scale-95">開始列印 (A4)</button>
                            </div>
                        </div>

                        <div ref={previewRef} className="flex-1 bg-slate-200 p-4 md:p-8 overflow-y-auto flex justify-center items-start min-h-[500px]">
                            <div className="w-full max-w-[800px] bg-white shadow-2xl aspect-[1/1.414] relative">
                                <WorksheetSVG pointsData={previewData.points} serialNumber={previewData.serial} showAnswers={showAnswers} />
                            </div>
                        </div>
                    </div>

                    {/* 列印專區：隱藏於 UI，僅在列印時顯示 */}
                    <div className="hidden print-block w-full bg-white">
                        {printPagesData.map((data, index) => (
                            <React.Fragment key={`prt-group-${index}`}>
                                <div className="print-page-svg">
                                    <WorksheetSVG pointsData={data.points} serialNumber={data.serial} showAnswers={false} />
                                </div>
                                {answerMode === 'full' && (
                                    <div className="print-page-svg relative">
                                        <div className="absolute text-[120px] font-black text-red-500 opacity-10 rotate-[-30deg] pointer-events-none">解答卷</div>
                                        <WorksheetSVG pointsData={data.points} serialNumber={data.serial} showAnswers={true} />
                                    </div>
                                )}
                            </React.Fragment>
                        ))}
                        
                        {answerMode === 'summary' && printPagesData.length > 0 && (
                            <div className="print-page-text" style={{ pageBreakBefore: 'always', clear: 'both' }}>
                                <h1 className="text-3xl font-black mb-6 text-black text-center tracking-wide whitespace-nowrap">教師專用解答總表</h1>
                                <table className="teacher-table">
                                    <thead><tr><th width="15%">編號</th><th>正確解答短句</th></tr></thead>
                                    <tbody>
                                        {printPagesData.map((data) => (
                                            <tr key={`sum-${data.serial}`}>
                                                <td className="font-bold text-center text-black">No. {data.serial}</td>
                                                <td className="font-bold text-xl text-black uppercase tracking-widest">{data.text}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* 強制切分：每 14 個項目產生一張全新的 A4 字庫頁面 */}
                        {printStudentDict && printPagesData.length > 0 && (() => {
                            const fullDict = getUniquePrintDict();
                            const dictPages = [];
                            for (let i = 0; i < fullDict.length; i += 14) {
                                dictPages.push(fullDict.slice(i, i + 14));
                            }
                            
                            return dictPages.map((pageItems, pageIndex) => (
                                <div key={`dict-page-${pageIndex}`} className="print-page-text" style={{ pageBreakBefore: 'always', clear: 'both' }}>
                                    <h1 className="text-3xl font-black mb-5 text-black text-center tracking-wide font-sans whitespace-nowrap">
                                        📝 解碼任務：中英參考字庫 (Word Bank) {dictPages.length > 1 ? `(${pageIndex + 1}/${dictPages.length})` : ''}
                                    </h1>
                                    <div className="dict-grid">
                                        {pageItems.map((dict, idx) => (
                                            <div key={`dict-${pageIndex}-${idx}`} className="dict-card">
                                                <div className="font-black text-[1.15rem] text-black uppercase mb-1">{dict.en}</div>
                                                {dict.ipa && <div className="font-mono text-sm text-gray-700 mb-1">{dict.ipa}</div>}
                                                <div className="font-bold text-[1.05rem] text-black">{dict.zh}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ));
                        })()}
                    </div>
                </div>
            );
        };

        const WorksheetSVG = ({ pointsData, serialNumber, showAnswers }) => {
            const svgWidth = 800, svgHeight = 1131, gridStartX = 100, gridStartY = 180, gridSize = 600, units = 40; 
            const pxPerUnit = gridSize / units, originX = gridStartX + gridSize / 2, originY = gridStartY + gridSize / 2; 

            const getX = (val) => originX + (val * pxPerUnit);
            const getY = (val) => originY - (val * pxPerUnit);

            const gridLines = [];
            for (let i = -20; i <= 20; i += 2) {
                const isAxis = i === 0;
                const isMajor = i % 10 === 0;
                const strokeColor = isAxis ? "#000000" : (isMajor ? "#94a3b8" : "#cbd5e1");
                const strokeWidth = isAxis ? "2.5" : (isMajor ? "1.5" : "1");

                gridLines.push(<line key={`v${i}`} x1={getX(i)} y1={getY(20)} x2={getX(i)} y2={getY(-20)} stroke={strokeColor} strokeWidth={strokeWidth} />);
                gridLines.push(<line key={`h${i}`} x1={getX(-20)} y1={getY(i)} x2={getX(20)} y2={getY(i)} stroke={strokeColor} strokeWidth={strokeWidth} />);
            }

            const axisArrows = (
                <g fill="#000000">
                    <polygon points={`${getX(20.6)},${originY} ${getX(19.8)},${originY-5} ${getX(19.8)},${originY+5}`} />
                    <polygon points={`${originX},${getY(20.6)} ${originX-5},${getY(19.8)} ${originX+5},${getY(19.8)}`} />
                    <text x={getX(20.5)} y={originY + 20} fontSize="18" fontStyle="italic" fontWeight="bold" fill="#000">x</text>
                    <text x={originX + 10} y={getY(20.5)} fontSize="18" fontStyle="italic" fontWeight="bold" fill="#000">y</text>
                </g>
            );

            const axisLabels = [];
            for (let i = -20; i <= 20; i += 2) {
                if (i !== 0) {
                    axisLabels.push(<text key={`tx${i}`} x={getX(i)} y={originY + 16} textAnchor="middle" fontSize="11" fill="#475569">{i}</text>);
                    axisLabels.push(<text key={`ty${i}`} x={originX + 6} y={getY(i) + 4} fontSize="11" fill="#475569">{i}</text>);
                }
            }
            axisLabels.push(<text key="t0" x={originX + 6} y={originY + 14} fontSize="12" fill="#475569">0</text>);

            const plotElements = pointsData.flatMap((w, wIdx) => w.map((pt, pIdx) => (
                <g key={`pt-${wIdx}-${pIdx}-${pt.x}-${pt.y}`}><circle cx={getX(pt.x)} cy={getY(pt.y)} r="3.5" fill="#0f172a" /><text x={getX(pt.x) + 6} y={getY(pt.y) + 4} fontSize="15" fontWeight="bold" fontFamily="Arial, sans-serif">{pt.char}</text></g>
            )));

            const boxSize = 36, wordSpacing = 28, maxRowWidth = 740, rowHeight = 110, startY = 850;
            const boxElements = [];
            let currentRows = [], currentRow = [], currentWidth = 0;
            pointsData.forEach(word => {
                const w = word.length * boxSize;
                if (currentRow.length > 0 && currentWidth + wordSpacing + w > maxRowWidth) { 
                    currentRows.push({ words: currentRow, width: currentWidth }); 
                    currentRow = [word]; currentWidth = w; 
                } else { 
                    currentRow.push(word); currentWidth += (currentRow.length > 1 ? wordSpacing : 0) + w; 
                }
            });
            if (currentRow.length > 0) currentRows.push({ words: currentRow, width: currentWidth });

            currentRows.forEach((row, rIdx) => {
                let curX = (svgWidth - row.width) / 2;
                row.words.forEach(word => {
                    word.forEach(pt => {
                        const bX = curX, bY = startY + rIdx * rowHeight, cX = bX + boxSize/2;
                        boxElements.push(<rect key={`box-${pt.x}-${pt.y}-${rIdx}`} x={bX} y={bY} width={boxSize} height={boxSize} fill="none" stroke="#334155" strokeWidth="1.5" />);
                        if (showAnswers) boxElements.push(<text key={`ans-${pt.x}-${pt.y}-${rIdx}`} x={cX} y={bY + 25} textAnchor="middle" fontSize="22" fontWeight="bold" fill="#2563eb" fontFamily="Arial, sans-serif">{pt.char}</text>);
                        if (pt.pos === 'below') {
                            boxElements.push(<line key={`lb-${pt.x}-${pt.y}-${rIdx}`} x1={cX} y1={bY + boxSize} x2={cX} y2={bY + boxSize + 12} stroke="#334155" strokeWidth="1" />);
                            boxElements.push(<text key={`cb-${pt.x}-${pt.y}-${rIdx}`} x={cX} y={bY + boxSize + 28} textAnchor="middle" fontSize="14">({pt.x},{pt.y})</text>);
                        } else {
                            boxElements.push(<line key={`la-${pt.x}-${pt.y}-${rIdx}`} x1={cX} y1={bY} x2={cX} y2={bY - 12} stroke="#334155" strokeWidth="1" />);
                            boxElements.push(<text key={`ca-${pt.x}-${pt.y}-${rIdx}`} x={cX} y={bY - 18} textAnchor="middle" fontSize="14">({pt.x},{pt.y})</text>);
                        }
                        curX += boxSize;
                    });
                    curX += wordSpacing;
                });
            });

            return (
                <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-full bg-white" style={{fontFamily: 'Arial, sans-serif'}} xmlns="http://www.w3.org/2000/svg">
                    <g className="header">
                        <text x="315" y="95" fontSize="46" fontWeight="bold" fill="#1e293b" textAnchor="end">實話</text>
                        <g transform="translate(400, 100)">
                            <text x="0" y="0" fontSize="76" fontWeight="900" fill="#0f172a" textAnchor="middle">直</text>
                            <text x="-65" y="-15" fontSize="70" fill="#0f172a" fontWeight="bold" textAnchor="middle">「</text>
                            <text x="65" y="15" fontSize="70" fill="#0f172a" fontWeight="bold" textAnchor="middle">」</text>
                        </g>
                        <text x="485" y="95" fontSize="46" fontWeight="bold" fill="#1e293b" textAnchor="start">說</text>
                        <text x="400" y="148" fontSize="22" fill="#475569" textAnchor="middle" letterSpacing="6">角坐標</text>

                        <g transform="translate(550, 55)" fontSize="18" fill="#1e293b">
                            <text y="0">班級：_____________</text>
                            <text y="40">座號：_____________</text>
                            <text y="80">姓名：_____________</text>
                        </g>
                    </g>

                    <g className="grid">{gridLines}{axisLabels}{axisArrows}</g>
                    <g className="points">{plotElements}</g>
                    <g className="boxes">{boxElements}</g>

                    <g className="logo" transform="translate(400, 1055)">
                        <g transform="translate(-118, 0)">
                            <text x="1" y="0" fontSize="38" fontWeight="900" fill="#1e293b" textLength="234" lengthAdjust="spacing">EsukaTION</text>
                            
                            <rect x="1" y="10" width="24" height="24" fill="none" stroke="#1e293b" strokeWidth="1.5" rx="3" />
                            <text x="13" y="27" fontSize="14" fontWeight="bold" textAnchor="middle" fill="#1e293b">奕</text>
                            
                            <rect x="31" y="10" width="24" height="24" fill="none" stroke="#1e293b" strokeWidth="1.5" rx="3" />
                            <text x="43" y="27" fontSize="14" fontWeight="bold" textAnchor="middle" fill="#1e293b">數</text>
                            
                            <rect x="61" y="10" width="24" height="24" fill="none" stroke="#1e293b" strokeWidth="1.5" rx="3" />
                            <text x="73" y="27" fontSize="14" fontWeight="bold" textAnchor="middle" fill="#1e293b">咖</text>
                            
                            <rect x="91" y="10" width="24" height="24" fill="none" stroke="#1e293b" strokeWidth="1.5" rx="3" />
                            <text x="103" y="27" fontSize="14" fontWeight="bold" textAnchor="middle" fill="#1e293b">學</text>

                            <rect x="121" y="10" width="114" height="24" fill="#1e293b" rx="4" />
                            <text x="178" y="27" fontSize="15" fontWeight="900" fill="#ffffff" textAnchor="middle" letterSpacing="1.5">education</text>
                        </g>
                        <text x="0" y="65" fontSize="20" fill="#0369a1" fontWeight="900" textAnchor="middle" letterSpacing="1">編號：{serialNumber}</text>
                    </g>
                </svg>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
