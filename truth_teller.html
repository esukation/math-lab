            const generatePoints = (text, serialNumber) => {
                const words = text.trim().toUpperCase().split(/\s+/).filter(w => w.length > 0);
                const usedCoords = new Set();
                const newPoints = [];

                words.forEach(word => {
                    const wordPoints = [];
                    for (let i = 0; i < word.length; i++) {
                        const char = word[i];
                        if (!/[A-Z]/.test(char)) continue;

                        let x, y, key;
                        do {
                            // 安全邊界防裁切
                            x = Math.floor(Math.random() * 37) - 18; 
                            y = Math.floor(Math.random() * 37) - 18; 
                            if (x === 0 && y === 0) continue;
                            key = `${x},${y}`;
                        } while (usedCoords.has(key));

                        usedCoords.add(key);
                        wordPoints.push({ char, x, y, pos: i % 2 === 0 ? 'below' : 'above' });
                    }
                    if (wordPoints.length > 0) newPoints.push(wordPoints);
                });
                return { points: newPoints, serial: serialNumber, text: text };
            };

            const generateWorksheet = (text = sentence) => {
                setPreviewData(generatePoints(text, '範例'));
            };

                if (window.innerWidth < 768 && previewRef.current) {
                    previewRef.current.scrollIntoView({ behavior: 'smooth' });

            };

            }, []);

                        pages.push(generatePoints(targetSentence, serialNum));

                        });

                availableDistractors.sort(() => Math.random() - 0.5);

                while (dictItems.length < targetCount && availableDistractors.length > 0) {
                    dictItems.push(availableDistractors.pop());
                }

                return dictItems.sort(() => Math.random() - 0.5);

        const WorksheetSVG = ({ pointsData, serialNumber, showAnswers }) => {
            const svgWidth = 800, svgHeight = 1131, gridStartX = 100, gridStartY = 180, gridSize = 600, units = 40; 
            const pxPerUnit = gridSize / units, originX = gridStartX + gridSize / 2, originY = gridStartY + gridSize / 2; 

            const getX = (val) => originX + (val * pxPerUnit);
            const getY = (val) => originY - (val * pxPerUnit);

            const gridLines = [];
            for (let i = -20; i <= 20; i += 2) {
                // 視覺層次優化：讓網格線較淺，主軸與重要刻度較深
                const isAxis = i === 0;
                const isMajor = i % 10 === 0;
                const strokeColor = isAxis ? "#000000" : (isMajor ? "#94a3b8" : "#cbd5e1");
                const strokeWidth = isAxis ? "2.5" : (isMajor ? "1.5" : "1");

                gridLines.push(<line key={`v${i}`} x1={getX(i)} y1={getY(20)} x2={getX(i)} y2={getY(-20)} stroke={strokeColor} strokeWidth={strokeWidth} />);
                gridLines.push(<line key={`h${i}`} x1={getX(-20)} y1={getY(i)} x2={getX(20)} y2={getY(i)} stroke={strokeColor} strokeWidth={strokeWidth} />);
            }

            // 嚴謹的數學標示：加上 x, y 軸箭頭與斜體變數標示
            const axisArrows = (
                <g fill="#000000">
                    <polygon points={`${getX(20.6)},${originY} ${getX(19.8)},${originY-5} ${getX(19.8)},${originY+5}`} />
                    <polygon points={`${originX},${getY(20.6)} ${originX-5},${getY(19.8)} ${originX+5},${getY(19.8)}`} />
                    <text x={getX(20.5)} y={originY + 20} fontSize="18" fontStyle="italic" fontWeight="bold" fill="#000">x</text>
                    <text x={originX + 10} y={getY(20.5)} fontSize="18" fontStyle="italic" fontWeight="bold" fill="#000">y</text>
                </g>
            );

            const axisLabels = [];
            for (let i = -20; i <= 20; i += 2) {
                if (i !== 0) {
                    axisLabels.push(<text key={`tx${i}`} x={getX(i)} y={originY + 16} textAnchor="middle" fontSize="11" fill="#475569">{i}</text>);
                    axisLabels.push(<text key={`ty${i}`} x={originX + 6} y={getY(i) + 4} fontSize="11" fill="#475569">{i}</text>);
                }
            }
            axisLabels.push(<text key="t0" x={originX + 6} y={originY + 14} fontSize="12" fill="#475569">0</text>);

            const plotElements = [];
            pointsData.forEach(word => word.forEach(pt => {
                const cx = getX(pt.x), cy = getY(pt.y);
                plotElements.push(<g key={`pt-${pt.char}-${pt.x}-${pt.y}`}><circle cx={cx} cy={cy} r="3.5" fill="#0f172a" /><text x={cx + 6} y={cy + 4} fontSize="15" fontWeight="bold" fill="#0f172a" fontFamily="Arial, Helvetica, sans-serif">{pt.char}</text></g>);
            }));

            const boxSize = 36, wordSpacing = 28, maxRowWidth = 740, rowHeight = 110, startY = 850;
            const boxElements = [];
            let currentRows = [], currentRow = [], currentWidth = 0;
            pointsData.forEach(word => {
                const wordWidth = word.length * boxSize;
                if (currentRow.length > 0 && currentWidth + wordSpacing + wordWidth > maxRowWidth) {
                    currentRows.push({ words: currentRow, width: currentWidth });
                    currentRow = [word]; currentWidth = wordWidth;
                } else {
                    currentRow.push(word); currentWidth += (currentRow.length > 1 ? wordSpacing : 0) + wordWidth;
                }
            });
            if (currentRow.length > 0) currentRows.push({ words: currentRow, width: currentWidth });

            let rY = startY;
            currentRows.forEach((row, rowIndex) => {
                let currentX = (svgWidth - row.width) / 2;
                row.words.forEach((word) => {
                    word.forEach((pt) => {
                        const boxX = currentX, boxY = rY;
                        boxElements.push(<rect key={`box-${pt.x}-${pt.y}`} x={boxX} y={boxY} width={boxSize} height={boxSize} fill="none" stroke="#334155" strokeWidth="1.5" />);
                        if (showAnswers) boxElements.push(<text key={`ans-${pt.x}-${pt.y}`} x={boxX + boxSize/2} y={boxY + 25} textAnchor="middle" fontSize="22" fontWeight="bold" fill="#2563eb" fontFamily="Arial, Helvetica, sans-serif">{pt.char}</text>);
                        const centerX = boxX + boxSize/2;
                        if (pt.pos === 'below') {
                            boxElements.push(<line key={`l-b-${pt.x}-${pt.y}`} x1={centerX} y1={boxY + boxSize} x2={centerX} y2={boxY + boxSize + 12} stroke="#334155" />);
                            boxElements.push(<text key={`c-b-${pt.x}-${pt.y}`} x={centerX} y={boxY + boxSize + 28} textAnchor="middle" fontSize="14">({pt.x},{pt.y})</text>);
                        } else {
                            boxElements.push(<line key={`l-a-${pt.x}-${pt.y}`} x1={centerX} y1={boxY} x2={centerX} y2={boxY - 12} stroke="#334155" />);
                            boxElements.push(<text key={`c-a-${pt.x}-${pt.y}`} x={centerX} y={boxY - 18} textAnchor="middle" fontSize="14">({pt.x},{pt.y})</text>);
                        }
                        currentX += boxSize;
                    });
                    currentX += wordSpacing;
                });
                rY += rowHeight;
            });

            return (
                <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-full bg-white" style={{fontFamily: 'Arial, Helvetica, sans-serif'}} xmlns="http://www.w3.org/2000/svg">
                    <g className="header">
                        <text x="330" y="85" fontSize="46" fontWeight="bold" fill="#1e293b" textAnchor="end">實話</text>
                        <text x="400" y="100" fontSize="76" fontWeight="900" fill="#0f172a" textAnchor="middle">「直」</text>
                        <text x="470" y="85" fontSize="46" fontWeight="bold" fill="#1e293b" textAnchor="start">說</text>
                        <text x="400" y="140" fontSize="22" fill="#475569" textAnchor="middle">角座標</text>
                        
                        {/* 恢復原狀：完美的班級座號姓名與編號對齊位置 */}
                        <g transform="translate(560, 45)" fontSize="18" fill="#1e293b">
                            <text y="-10" fontSize="22" fill="#0369a1" fontWeight="900">編號：{serialNumber}</text>
                            <text y="25">班級：_________________</text>
                            <text y="60">座號：_________________</text>
                            <text y="95">姓名：_________________</text>
                        </g>
                    </g>

                    <g className="grid">{gridLines}{axisLabels}{axisArrows}</g>
                    <g className="points">{plotElements}</g>
                    <g className="boxes">{boxElements}</g>

                    <g className="logo" transform="translate(400, 1055)">

                            <rect x="30" y="10" width="24" height="24" fill="none" stroke="#1e293b" strokeWidth="1.5" rx="3" />
                            <text x="42" y="27" fontSize="14" fontWeight="bold" textAnchor="middle" fill="#1e293b">數</text>
                            <rect x="60" y="10" width="24" height="24" fill="none" stroke="#1e293b" strokeWidth="1.5" rx="3" />
                            <text x="72" y="27" fontSize="14" fontWeight="bold" textAnchor="middle" fill="#1e293b">咖</text>
                            <rect x="90" y="10" width="24" height="24" fill="none" stroke="#1e293b" strokeWidth="1.5" rx="3" />
                            <text x="102" y="27" fontSize="14" fontWeight="bold" textAnchor="middle" fill="#1e293b">學</text>
                            <rect x="120" y="10" width="114" height="24" fill="#1e293b" rx="4" />
                            <text x="177" y="27" fontSize="15" fontWeight="900" fill="#ffffff" textAnchor="middle" letterSpacing="1.5">education</text>
                        </g>
                    </g>
                </svg>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));

    </script>
